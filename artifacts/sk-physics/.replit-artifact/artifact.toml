kind = "web"
previewPath = "/"
title = "SK Physics - Shubham Kaushal"
version = "1.0.0"
id = "artifacts/sk-physics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19181

[services.development]
run = "pnpm --filter @workspace/sk-physics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sk-physics", "run", "build" ]
publicDir = "artifacts/sk-physics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19181"
BASE_PATH = "/"
